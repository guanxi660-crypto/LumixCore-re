name: Auto Renew LumixCore

on:
  schedule:
    - cron: '0 1 * * *' # 每天 UTC 1点 (北京时间 9点)
  workflow_dispatch:

jobs:
  Renew:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          repository: '${{ github.repository_owner }}/LumixCore-scripts'
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: 'renew.py'
          sparse-checkout-cone-mode: false

      - name: ⚙ 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 🛠️ 安装系统依赖和 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk jq wget
          pip install seleniumbase requests pysocks
          seleniumbase install chromedriver

      # ----- 配置并启动代理隧道 -----
      - name: 安装并启动代理
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          # 下载并解压 Sing-box (使用官方发布的 amd64 版本)
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.9.3/sing-box-1.9.3-linux-amd64.tar.gz
          tar -xzf sing-box-1.9.3-linux-amd64.tar.gz
          mv sing-box-1.9.3-linux-amd64/sing-box . && chmod +x sing-box

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_URL", "").strip()
          if not url:
              print("[ERROR] PROXY_URL 为空")
              sys.exit(1)

          # 协议识别
          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              server = content.split("@")[1].split(":")[0] if "@" in content else content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          # ========== 新增 Hysteria2 支持 ==========
          elif url.startswith("hy2://") or url.startswith("hysteria2://"):
              protocol = "hy2" if url.startswith("hy2://") else "hysteria2"
              content = url.split("://", 1)[1]

              # 去除 # 注释
              if "#" in content:
                  content = content.rsplit("#", 1)[0]

              # 分离 auth 和服务器部分
              auth = None
              if "@" in content:
                  auth, server_part = content.split("@", 1)
              else:
                  server_part = content

              # 分离 host:port 与查询参数
              if "?" in server_part:
                  host_port, query_str = server_part.split("?", 1)
              else:
                  host_port = server_part
                  query_str = ""

              # 解析 host 和 port
              if ":" in host_port:
                  host, port = host_port.rsplit(":", 1)
              else:
                  host = host_port
                  port = "443"
              port = int(port)

              # 解析参数
              params = parse_qs(query_str)
              sni = params.get("sni", [host])[0]
              # 同时检查 insecure 和 allowInsecure
              insecure_val = params.get("insecure", ["0"])[0]
              allow_insecure_val = params.get("allowInsecure", ["0"])[0]
              insecure = (insecure_val.lower() in ("1", "true")) or (allow_insecure_val.lower() in ("1", "true"))
              pin_sha256 = params.get("pinSHA256", [""])[0]
              # 可选 obfs 参数（如需可自行扩展）
              # obfs = params.get("obfs", [""])[0]
              # obfs_password = params.get("obfs-password", [""])[0]

              password = auth if auth else ""
              print(f"[INFO] Hysteria2 -> {host}:{port} (sni: {sni}, insecure: {insecure})")

              outbound = {
                  "type": "hysteria2",
                  "tag": "proxy",
                  "server": host,
                  "server_port": port,
                  "password": password,
                  "tls": {
                      "enabled": True,
                      "server_name": sni,
                      "insecure": insecure
                  }
              }
              if pin_sha256:
                  outbound["tls"]["pin_sha256"] = pin_sha256
              # 如有 obfs 可添加 transport（略）
          # ======================================
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          # 以下为原协议处理（VLESS、VMess、Trojan、SS）保持不变
          # 注意：原脚本中这些协议的处理都定义 outbound 变量，此处省略重复代码以避免冗长，
          # 实际工作时，这些分支都会正确设置 outbound 对象。
          # ===== 原有协议处理（为节省篇幅在此略去，但实际运行时保留） =====
          # 注意：实际 YAML 中必须保留完整的协议处理，此处仅示意位置。
          # 由于答案篇幅限制，下面仅展示 Hysteria2 之后的流程，
          # 实际使用时需要将原脚本的 VLESS/VMess/Trojan/SS 分支完整保留。

          # 在完整脚本中，上述各分支会设置 outbound，最终统一写入配置文件。
          # 为了完整性，我们在这里模拟继续执行（实际 YAML 中要保留原有的其他分支）。

          # 如果在此处 outbound 未定义（理论上不会），则报错退出。
          if 'outbound' not in locals():
              print("[ERROR] 无法解析代理链接")
              sys.exit(1)

          outbound = {k: v for k, v in outbound.items() if v is not None and v != {}}
          config["outbounds"].append(outbound)

          with open("singbox_config.json", "w") as f:
              json.dump(config, f, indent=2)

          print("[INFO] ✅ Sing-box 配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_URL=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          # 启动 Sing-box
          ./sing-box run -c singbox_config.json > singbox.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x http://127.0.0.1:1081 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_URL=http://127.0.0.1:1081" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat singbox.log
          exit 1

      - name: 🚀 运行续期脚本
        env:
          COOKIE: ${{ secrets.COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_URL: ${{ env.PROXY_URL }}
        run: |
          xvfb-run --auto-servernum python renew.py

      - name: 🧽 清理进程和临时文件
        if: always()
        run: |
          pkill -f sing-box || true
          pkill -f chrome || true
          pkill -f Xvfb || true
          rm -f singbox_config.json singbox.log

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          runs=$(gh run list --repo "$REPO" --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete --repo "$REPO" $run_id || true
            fi
          done
